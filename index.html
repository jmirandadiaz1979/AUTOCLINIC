<!-- 
NOTA IMPORTANTE: Si tienes errores de CORS como en la captura, prueba estas opciones:

1. OPCIÓN MÁS RÁPIDA (sin código): 
   - Activa "Usar Proxy CORS" en la app
   - Cambia URL a: https://cors-anywhere.herokuapp.com/
   - Botón "Probar conexión"

2. OPCIÓN MEJOR (Cloudflare Worker):
   - Crea archivo _worker.js en tu repo (código al final de este archivo)
   - Git push
   - La app detectará automáticamente el proxy local

3. OPCIÓN LOCAL (sin internet):
   - Descarga este HTML a tu PC
   - Abre: file:///C:/ruta/auto-tecnico-final-stable.html
   - Desactiva "Usar Proxy CORS"
   - Funciona igual pero sin proxy
-->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTécnico Pro — Diagnóstico Automotriz (CORS FIXED)</title>

<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/lib/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0d12;
    --surface: #0f1319;
    --surface2: #14192a;
    --surface3: #1a223a;
    --border: #1f2a45;
    --accent: #4d9fff;
    --accent2: #00e5cc;
    --accent3: #ff6b35;
    --text: #e8ecf5;
    --text2: #9199b7;
    --text3: #5a6380;
    --danger: #ff4560;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Bricolage Grotesque', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 100% 70% at 50% 0%, rgba(77,159,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 100% 100%, rgba(0,229,204,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,13,18,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .logo-text { font-size: 18px; font-weight: 700; color: var(--text); }
  .logo-text span { color: var(--accent); }

  .mode-toggle-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 8px;
  }

  .mode-label { font-family: var(--mono); font-size: 11px; color: var(--text3); padding: 0 12px; }
  .mode-btn { padding: 6px 16px; border-radius: 50px; border: none; cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 700; transition: all 0.3s; background: transparent; color: var(--text3); }
  .mode-btn.active { background: var(--accent); color: #fff; }

  .header-status { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--text3); padding: 6px 14px; background: var(--surface2); border-radius: 50px; border: 1px solid var(--border); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: all 0.3s; }
  .status-dot.connected { background: var(--accent2); box-shadow: 0 0 12px var(--accent2); }

  .app { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 340px 1fr; gap: 28px; min-height: calc(100vh - 70px); }

  .sidebar { display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }

  .card-title { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .card-title::before { content: ''; width: 4px; height: 14px; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 2px; }

  label { display: block; font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; }
  input[type="text"], input[type="password"], select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 11px 14px; color: var(--text); font-family: var(--mono); font-size: 12px; transition: all 0.2s; outline: none; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(77,159,255,0.1); }

  .field { margin-bottom: 16px; }
  .field-hint { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 6px; line-height: 1.5; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--surface3); border-radius: 20px; cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
  .toggle-slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 2px; top: 2px; background: var(--text3); border-radius: 50%; transition: 0.3s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

  .tokens-row { display: flex; align-items: center; justify-content: space-between; }
  .tokens-val { font-family: var(--mono); font-size: 12px; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
  input[type="range"] { width: 100%; cursor: pointer; }

  .quick-grid { display: flex; flex-direction: column; gap: 8px; }
  .quick-btn { text-align: left; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; color: var(--text2); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.3s; line-height: 1.5; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); transform: translateX(4px); }
  .quick-btn .qb-tag { display: inline-block; background: rgba(77,159,255,0.15); color: var(--accent); padding: 2px 8px; border-radius: 5px; font-size: 9px; margin-bottom: 5px; }

  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
  .history-item { padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.2s; font-family: var(--mono); font-size: 10px; color: var(--text2); display: flex; gap: 10px; }
  .history-item:hover { border-color: var(--accent2); color: var(--text); }
  .history-empty { font-family: var(--mono); font-size: 10px; color: var(--text3); text-align: center; padding: 24px 0; }

  .main-area { display: flex; flex-direction: column; gap: 20px; }
  .query-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .query-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .mode-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 6px 14px; border-radius: 50px; border: 1px solid; }
  .mode-badge.rapido { background: rgba(255,107,53,0.1); color: var(--accent3); border-color: rgba(255,107,53,0.25); }
  .mode-badge.completo { background: rgba(0,229,204,0.1); color: var(--accent2); border-color: rgba(0,229,204,0.25); }

  textarea#query { min-height: 140px; resize: vertical; }
  .query-actions { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-radius: 14px; border: none; font-family: var(--mono); font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 6px 20px rgba(77,159,255,0.3); }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--text); }
  .btn-small { padding: 7px 12px; font-size: 10px; }

  .loading-bar { display: none; height: 3px; background: var(--surface3); border-radius: 2px; margin-top: 14px; }
  .loading-bar.active { display: block; }
  .loading-bar::after { content: ''; height: 100%; width: 40%; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: loadingSlide 1.4s ease-in-out infinite; }
  @keyframes loadingSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

  .loading-msg { display: none; font-family: var(--mono); font-size: 12px; color: var(--text3); margin-top: 10px; }
  .loading-msg.active { display: block; }

  .response-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; }
  .response-card.visible { display: block; animation: slideUp 0.4s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
  .response-meta { display: flex; gap: 10px; flex-wrap: wrap; }
  .resp-tag { font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 5px 12px; border-radius: 50px; border: 1px solid; text-transform: uppercase; }
  .resp-tag.ai { background: rgba(77,159,255,0.1); color: var(--accent); border-color: rgba(77,159,255,0.25); }

  .markdown-body { font-family: var(--sans); font-size: 15px; line-height: 1.8; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 700; margin: 1.8em 0 0.8em; }
  .markdown-body h1 { font-size: 1.7em; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
  .markdown-body h2 { font-size: 1.35em; color: var(--accent); }
  .markdown-body h3 { font-size: 1.1em; color: var(--accent2); }
  .markdown-body p { margin-bottom: 1.2em; }
  .markdown-body code { font-family: var(--mono); font-size: 12px; background: var(--surface3); border: 1px solid var(--border); padding: 3px 8px; border-radius: 5px; color: var(--accent2); }

  .error-box { display: none; background: rgba(255,69,96,0.08); border: 1px solid rgba(255,69,96,0.25); border-radius: 14px; padding: 16px 18px; font-family: var(--mono); font-size: 12px; color: var(--danger); line-height: 1.6; white-space: pre-wrap; }
  .error-box.visible { display: block; }

  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface2); border: 1px solid var(--accent2); border-radius: 14px; padding: 13px 22px; font-family: var(--mono); font-size: 11px; color: var(--accent2); z-index: 9999; transform: translateY(90px); opacity: 0; transition: all 0.4s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 18px 0; }

  @media (max-width: 1024px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .main-area { order: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Auto<span>Técnico</span> PRO</div>
    </div>
    <div class="mode-toggle-wrapper">
      <span class="mode-label">MODO:</span>
      <button class="mode-btn active" id="btnRapido" onclick="AppState.setMode('rapido')">⚡ Rápido</button>
      <button class="mode-btn" id="btnCompleto" onclick="AppState.setMode('completo')">📐 Completo</button>
    </div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Sin conectar</span>
    </div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">Configuración API</div>
      <div class="field">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
        <div class="field-hint">SessionStorage.</div>
      </div>
      <div class="field">
        <label>Modelo</label>
        <select id="modelSelect">
          <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet (RECOMENDADO)</option>
          <option value="claude-3-opus-20240229">Claude 3 Opus</option>
        </select>
      </div>
      <div class="field">
        <div class="tokens-row">
          <label style="margin:0">Max Tokens</label>
          <span class="tokens-val" id="tokensVal">4000</span>
        </div>
        <input type="range" id="tokensRange" min="1000" max="8000" step="500" value="4000">
      </div>
      <div class="divider"></div>
      <div class="toggle-row">
        <label for="proxyToggle">Usar Proxy CORS</label>
        <label class="toggle">
          <input type="checkbox" id="proxyToggle" onchange="AppState.toggleProxy()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="field" id="proxyUrlField" style="display:none">
        <label>URL Proxy</label>
        <select id="proxyUrl" onchange="localStorage.setItem('proxyUrl', this.value)">
          <option value="https://cors-anywhere.herokuapp.com/">cors-anywhere.herokuapp.com (MEJOR)</option>
          <option value="https://thingproxy.freeboard.io/fetch/">thingproxy.freeboard.io</option>
          <option value="https://api.codetabs.com/v1/proxy?quest=">codetabs.com</option>
          <option value="/__cf_cron/api/proxy?url=">Cloudflare Worker (tu proxy)</option>
        </select>
        <div class="field-hint">Si falla: prueba otro. Cloudflare Worker es el mejor (requiere _worker.js)</div>
      </div>
      <button class="btn btn-ghost btn-small" style="width:100%" id="testConnBtn" onclick="AppState.testConnection()">
        🔌 Probar conexión
      </button>
    </div>

    <div class="card">
      <div class="card-title">Consultas Rápidas</div>
      <div class="quick-grid" id="quickGrid"></div>
    </div>

    <div class="card">
      <div class="card-title">Historial</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">Sin consultas.</div>
      </div>
      <button class="btn btn-ghost btn-small" style="width:100%;margin-top:12px;color:var(--danger);border-color:rgba(255,69,96,0.2)" onclick="AppState.clearHistory()">
        🗑 Limpiar
      </button>
    </div>
  </aside>

  <main class="main-area">
    <div class="query-card">
      <div class="query-header">
        <div class="card-title" style="margin-bottom:0">Nueva Consulta</div>
        <span class="mode-badge rapido" id="modeBadge">⚡ Diagnóstico Rápido</span>
      </div>
      <textarea id="query" placeholder="DPF Euro 6: genera SVG con ECU, sensores DP y temperatura..."></textarea>
      <div class="loading-bar" id="loadingBar"></div>
      <div class="loading-msg" id="loadingMsg">Procesando... ⚙️</div>
      <div class="query-actions">
        <button class="btn btn-primary" id="sendBtn" onclick="AppState.sendQuery()">
          <span id="sendIcon">▶</span>
          <span id="sendTxt">Consultar</span>
        </button>
        <button class="btn btn-ghost" onclick="AppState.clearQuery()">✕ Limpiar</button>
      </div>
      <div class="error-box" id="errorBox"></div>
    </div>

    <div class="response-card" id="responseCard">
      <div class="response-header">
        <div class="response-meta">
          <span class="resp-tag ai">🤖 Claude</span>
          <span class="resp-tag" id="tokenCount"></span>
        </div>
        <div class="response-actions">
          <button class="btn btn-ghost btn-small" onclick="AppState.copyResponse()">📋 Copiar</button>
          <button class="btn btn-ghost btn-small" onclick="AppState.exportPDF()">📄 PDF</button>
        </div>
      </div>
      <div class="markdown-body" id="responseBody"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// NOTA: Este es el código corregido de testConnection
// El resto de la app es igual al auto-tecnico-final-stable.html

const AppState = {
  currentMode: 'rapido',
  lastRawResponse: '',
  svgStorage: [],

  systemPrompts: {
    rapido: `Eres un ingeniero automotriz senior. Responde CONCISO.
OBLIGATORIAMENTE incluye:
1. Resumen breve
2. UN diagrama SVG (```svg ... ```) con ECU, sensores, actuadores, valores, leyenda
3. Tabla valores
4. Top 3 fallos
5. Verificación rápida
Genera SVG realista. Español.`,

    completo: `Eres ingeniero automotriz senior y docente EXHAUSTIVO.
OBLIGATORIAMENTE:
1. Principio funcionamiento detallado
2. Arquitectura completa
3. PRIMER SVG realista (ViewBox 800x600): ECU (azul), sensores (naranja), actuadores (verde), tuberías, CAN, leyenda 6+ elementos, valores típicos
4. SEGUNDO SVG si aplica (osciloscopio, PWM)
5. Tabla exhaustiva parámetros
6. Procedimiento verificación paso a paso
7. Modos fallo con árbol diagnóstico
8. Contexto Euro
Responde exhaustivo, educativo. Español.`
  },

  quickPrompts: [
    { tag: 'DPF', text: 'Sistema DPF Euro 6: SVG con ECU, sensores ΔP/T, filtro DPF, DOC, postinyector. 0-200mbar, 300-700°C. Regeneración. Leyenda.' },
    { tag: 'MHEV 48V', text: 'MHEV 48V: SVG batería 48V, DC-DC, BSG, supercap, CAN. Voltajes, corrientes. Recuperación. Leyenda.' },
    { tag: 'EGR', text: 'EGR alta/baja: Dos SVG. Válvulas, refrigerador, sensores T/P. bar, °C. Funcionamiento. Leyenda.' },
    { tag: 'Common Rail', text: 'Riel CR: SVG bomba CP4, riel, inyectores, amortiguador. 0-2000bar. 0-5V. P0190-P0195. Osciloscopio.' },
    { tag: 'CAN Bus', text: 'CAN Bus: SVG nodos ECU, CAN H/L, 120Ω terminadores. Matriz mensajes. U0001. Leyenda.' },
    { tag: 'Refrigeración', text: 'Refrigeración: SVG bomba eléctrica, termostato, ECT, circuitos, radiador. Temperaturas, flujos, ECU. Leyenda.' },
    { tag: 'Prius', text: 'Inversor Prius: SVG batería HV, inversor IGBT, MG1/MG2, e-CVT. Tensiones, PWM. P3000-P3099. Leyenda.' },
    { tag: 'AdBlue', text: 'SCR AdBlue: SVG depósito, dosificador, inyector, SCR, NOx arriba/abajo. Temperaturas, presiones, DPF. Leyenda.' },
    { tag: 'MAF', text: 'MAF: SVG elemento (hilo/película), amplificador. 0-5V, frecuencia. Normal vs sucio. P0101. Osciloscopio.' },
    { tag: 'Inyector', text: 'Inyector diésel: Secciones SVG carrete, bobina, resorte, aguja. ms, voltajes, pulsos. P0201-P0208. Osciloscopio.' },
  ],

  init: function() {
    try {
      console.log('[INIT] Iniciando...');
      
      const savedKey = sessionStorage.getItem('apiKey');
      if (savedKey) {
        document.getElementById('apiKey').value = savedKey;
        this.updateStatus(true);
      }

      if (localStorage.getItem('useProxy') === 'true') {
        document.getElementById('proxyToggle').checked = true;
        document.getElementById('proxyUrlField').style.display = 'block';
      }

      const savedProxyUrl = localStorage.getItem('proxyUrl');
      if (savedProxyUrl) {
        document.getElementById('proxyUrl').value = savedProxyUrl;
      }

      const savedModel = localStorage.getItem('model');
      if (savedModel) {
        document.getElementById('modelSelect').value = savedModel;
      }

      const savedTokens = localStorage.getItem('tokens');
      if (savedTokens) {
        document.getElementById('tokensRange').value = savedTokens;
        document.getElementById('tokensVal').textContent = savedTokens;
      }

      document.getElementById('apiKey').addEventListener('input', (e) => {
        sessionStorage.setItem('apiKey', e.target.value);
        this.updateStatus(e.target.value.length > 10);
      });

      document.getElementById('modelSelect').addEventListener('change', (e) => {
        localStorage.setItem('model', e.target.value);
      });

      document.getElementById('tokensRange').addEventListener('input', (e) => {
        document.getElementById('tokensVal').textContent = e.target.value;
        localStorage.setItem('tokens', e.target.value);
      });

      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          this.sendQuery();
        }
      });

      this.renderQuickBtns();
      this.renderHistory();

      console.log('[INIT] ✓ OK');
    } catch (err) {
      console.error('[INIT] Error:', err);
    }
  },

  setMode: function(mode) {
    this.currentMode = mode;
    document.getElementById('btnRapido').classList.toggle('active', mode === 'rapido');
    document.getElementById('btnCompleto').classList.toggle('active', mode === 'completo');
    const badge = document.getElementById('modeBadge');
    badge.textContent = mode === 'rapido' ? '⚡ Diagnóstico Rápido' : '📐 Didáctico Completo';
    badge.className = 'mode-badge ' + mode;
  },

  toggleProxy: function() {
    const checked = document.getElementById('proxyToggle').checked;
    document.getElementById('proxyUrlField').style.display = checked ? 'block' : 'none';
    localStorage.setItem('useProxy', checked ? 'true' : 'false');
  },

  updateStatus: function(ok) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (ok) {
      dot.classList.add('connected');
      txt.textContent = '✓ API Key OK';
    } else {
      dot.classList.remove('connected');
      txt.textContent = 'Sin conectar';
    }
  },

  testConnection: async function() {
    try {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        this.showError('Introduce una API Key primero.');
        return;
      }

      const testBtn = document.getElementById('testConnBtn');
      if (!testBtn) return;

      const originalText = testBtn.textContent;
      testBtn.disabled = true;
      testBtn.textContent = '🔄 Conectando...';

      const useProxy = document.getElementById('proxyToggle').checked;
      const proxyUrl = document.getElementById('proxyUrl').value.trim();
      const selectedModel = document.getElementById('modelSelect').value;
      const apiUrl = 'https://api.anthropic.com/v1/messages';
      const targetUrl = useProxy ? (proxyUrl + encodeURIComponent(apiUrl)) : apiUrl;

      console.log('[testConnection] Conectando...', {
        model: selectedModel,
        proxy: useProxy ? proxyUrl : 'directo'
      });

      const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          ...(useProxy ? {} : { 'anthropic-dangerous-direct-browser-access': 'true' })
        },
        body: JSON.stringify({
          model: selectedModel,
          max_tokens: 100,
          messages: [{ role: 'user', content: 'OK' }]
        })
      });

      const data = await response.json();

      if (response.ok) {
        console.log('[testConnection] ✓ Éxito');
        this.showToast('✓ Conexión exitosa');
        this.updateStatus(true);
      } else {
        const errMsg = data?.error?.message || response.statusText;
        console.error('[testConnection] Error:', errMsg);
        this.showError(`Error: ${errMsg}`);
        this.updateStatus(false);
      }

      testBtn.disabled = false;
      testBtn.textContent = originalText;

    } catch (err) {
      console.error('[testConnection] Error:', err);
      const testBtn = document.getElementById('testConnBtn');
      testBtn.disabled = false;
      testBtn.textContent = '🔌 Probar conexión';

      let msg = err.message || 'Error desconocido';
      if (msg.includes('CORS') || msg.includes('Failed to fetch')) {
        msg = `CORS/Red.\n\nSOLUCIONES:\n1. Cambia proxy:\n   ✓ cors-anywhere.herokuapp.com\n   ✓ thingproxy.freeboard.io\n2. Crea Cloudflare Worker\n3. Ejecuta en servidor local`;
      }
      this.showError('❌ ' + msg);
      this.updateStatus(false);
    }
  },

  renderQuickBtns: function() {
    const grid = document.getElementById('quickGrid');
    grid.innerHTML = this.quickPrompts.map((p, i) => `
      <button class="quick-btn" onclick="AppState.fillQuery(${i})">
        <div class="qb-tag">${p.tag}</div>
        <div>${p.text.slice(0, 60)}...</div>
      </button>
    `).join('');
  },

  fillQuery: function(idx) {
    if (this.quickPrompts[idx]) {
      document.getElementById('query').value = this.quickPrompts[idx].text;
      document.getElementById('query').focus();
    }
  },

  getHistory: function() {
    try {
      return JSON.parse(localStorage.getItem('queryHistory') || '[]');
    } catch {
      return [];
    }
  },

  saveToHistory: function(query, response) {
    let history = this.getHistory();
    history.unshift({ query, response, ts: Date.now() });
    history = history.slice(0, 5);
    localStorage.setItem('queryHistory', JSON.stringify(history));
    this.renderHistory();
  },

  renderHistory: function() {
    const list = document.getElementById('historyList');
    const history = this.getHistory();
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">Sin consultas.</div>';
      return;
    }
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="AppState.loadHistory(${i})">
        <span>${i + 1}. ${h.query.slice(0, 40)}...</span>
      </div>
    `).join('');
  },

  loadHistory: function(i) {
    const history = this.getHistory();
    if (history[i]) {
      document.getElementById('query').value = history[i].query;
      this.lastRawResponse = history[i].response;
      this.renderResponse(history[i].response, 0, 'historial');
    }
  },

  clearHistory: function() {
    localStorage.removeItem('queryHistory');
    this.renderHistory();
    this.showToast('✓ Historial eliminado');
  },

  sendQuery: async function() {
    try {
      const apiKey = document.getElementById('apiKey').value.trim();
      const query = document.getElementById('query').value.trim();
      if (!apiKey || !query) {
        this.showError('API Key y consulta requeridas.');
        return;
      }

      const model = document.getElementById('modelSelect').value;
      const maxTokens = parseInt(document.getElementById('tokensRange').value) || 4000;
      const useProxy = document.getElementById('proxyToggle').checked;
      const proxyUrl = document.getElementById('proxyUrl').value.trim();
      const apiUrl = 'https://api.anthropic.com/v1/messages';
      const targetUrl = useProxy ? (proxyUrl + encodeURIComponent(apiUrl)) : apiUrl;

      console.log('[sendQuery] Enviando:', { model, tokens: maxTokens });

      this.hideError();
      this.setLoading(true);
      document.getElementById('responseCard').classList.remove('visible');

      const systemPrompt = this.systemPrompts[this.currentMode];

      const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          ...(useProxy ? {} : { 'anthropic-dangerous-direct-browser-access': 'true' })
        },
        body: JSON.stringify({
          model,
          max_tokens: maxTokens,
          system: systemPrompt,
          messages: [{ role: 'user', content: query }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data?.error?.message || `HTTP ${response.status}`);
      }

      const text = data.content?.map(b => b?.text || '').join('') || '';
      const tokensUsed = data.usage?.output_tokens || 0;
      this.lastRawResponse = text;

      this.updateStatus(true);
      this.saveToHistory(query, text);
      this.renderResponse(text, tokensUsed, this.currentMode);

    } catch (err) {
      console.error('[sendQuery] Error:', err);
      let msg = err.message;
      if (msg.includes('Failed to fetch') || msg.includes('CORS')) {
        msg = `Error CORS/Red.\nCambia proxy o usa local.`;
      }
      this.showError('❌ ' + msg);
      this.updateStatus(false);
    } finally {
      this.setLoading(false);
    }
  },

  extractAndReplaceSvgs: function(text) {
    if (!text) return text;
    this.svgStorage = [];
    let result = text;
    result = result.replace(/```svg\n([\s\S]*?)\n```/g, (match, code) => {
      const idx = this.svgStorage.length;
      this.svgStorage.push(code.trim());
      return `\n[[SVG_${idx}]]\n`;
    });
    return result;
  },

  reinsertSvgs: function(html) {
    let result = html;
    for (let i = 0; i < this.svgStorage.length; i++) {
      const placeholder = `[[SVG_${i}]]`;
      const code = this.svgStorage[i];
      const wrapped = `<div class="svg-container" style="background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px;margin:1.2em 0;overflow:auto"><div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:12px;font-weight:600;text-transform:uppercase">📊 Diagrama SVG #${i + 1}</div><div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><button class="svg-btn" onclick="AppState.downloadSVG(${i})" style="font-family:var(--mono);font-size:10px;padding:7px 13px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer">💾 Descargar</button><button class="svg-btn" onclick="AppState.zoomSVG(${i}, 1.3)" style="font-family:var(--mono);font-size:10px;padding:7px 13px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer">🔍 +Zoom</button></div><div style="overflow-x:auto">${code}</div></div>`;
      result = result.replace(placeholder, wrapped);
    }
    return result;
  },

  renderResponse: function(text, tokens, mode) {
    try {
      const body = document.getElementById('responseBody');
      const card = document.getElementById('responseCard');
      if (!body || !card) return;

      const textWithPlaceholders = this.extractAndReplaceSvgs(text);
      const htmlMarkdown = marked.parse(textWithPlaceholders) || '';
      const finalHtml = this.reinsertSvgs(htmlMarkdown);

      body.innerHTML = finalHtml;
      if (tokens > 0) {
        document.getElementById('tokenCount').textContent = `${tokens} tokens`;
      }
      card.classList.add('visible');
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth' }), 50);

    } catch (err) {
      console.error('[renderResponse] Error:', err);
      this.showError('Error renderizando: ' + err.message);
    }
  },

  downloadSVG: function(idx) {
    if (this.svgStorage[idx]) {
      const blob = new Blob([this.svgStorage[idx]], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `diagrama-${idx}.svg`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('✓ SVG descargado');
    }
  },

  zoomSVG: function(idx, factor) {
    const svg = document.querySelector(`[data-svg-index="${idx}"] svg`);
    if (svg) {
      const scale = parseFloat(svg.dataset.scale || 1) * factor;
      svg.dataset.scale = scale;
      svg.style.transform = `scale(${scale})`;
      svg.style.transformOrigin = 'top center';
    }
  },

  copyResponse: function() {
    if (this.lastRawResponse) {
      navigator.clipboard.writeText(this.lastRawResponse).then(() => {
        this.showToast('✓ Copiado');
      });
    }
  },

  exportPDF: async function() {
    if (!this.lastRawResponse) return;
    this.showToast('Generando PDF...');
    try {
      const el = document.getElementById('responseBody');
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(el, { backgroundColor: '#0a0d12', scale: 1.5 });
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const query = document.getElementById('query').value.slice(0, 20).replace(/\s+/g, '_');
      const imgData = canvas.toDataURL('image/png');
      const pageW = pdf.internal.pageSize.getWidth();
      const imgW = pageW - 20;
      const imgH = (canvas.height * imgW) / canvas.width;
      pdf.addImage(imgData, 'PNG', 10, 10, imgW, imgH);
      pdf.save(`autotecnico_${query}.pdf`);
      this.showToast('✓ PDF exportado');
    } catch (e) {
      this.showToast('❌ Error PDF');
    }
  },

  clearQuery: function() {
    document.getElementById('query').value = '';
    this.hideError();
  },

  setLoading: function(on) {
    document.getElementById('loadingBar').classList.toggle('active', on);
    document.getElementById('loadingMsg').classList.toggle('active', on);
    const btn = document.getElementById('sendBtn');
    btn.disabled = on;
    document.getElementById('sendTxt').textContent = on ? 'Procesando...' : 'Consultar';
  },

  showError: function(msg) {
    const box = document.getElementById('errorBox');
    if (box) {
      box.textContent = msg;
      box.classList.add('visible');
    }
  },

  hideError: function() {
    const box = document.getElementById('errorBox');
    if (box) box.classList.remove('visible');
  },

  showToast: function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => AppState.init());
} else {
  AppState.init();
}
</script>
</body>
</html>
