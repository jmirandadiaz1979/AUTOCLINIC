<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTécnico Pro — Diagnóstico Automotriz (ESTABLE)</title>

<!-- CDN Libraries - Versiones estables -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/lib/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0d12;
    --surface: #0f1319;
    --surface2: #14192a;
    --surface3: #1a223a;
    --border: #1f2a45;
    --accent: #4d9fff;
    --accent2: #00e5cc;
    --accent3: #ff6b35;
    --text: #e8ecf5;
    --text2: #9199b7;
    --text3: #5a6380;
    --danger: #ff4560;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Bricolage Grotesque', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 100% 70% at 50% 0%, rgba(77,159,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 100% 100%, rgba(0,229,204,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,13,18,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(77,159,255,0.2);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.8px;
    color: var(--text);
  }

  .logo-text span { 
    background: linear-gradient(90deg, var(--accent), var(--accent2)); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
  }

  .mode-toggle-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 8px;
  }

  .mode-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    padding: 0 12px;
    white-space: nowrap;
    font-weight: 600;
    text-transform: uppercase;
  }

  .mode-btn {
    padding: 6px 16px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    transition: all 0.3s;
    background: transparent;
    color: var(--text3);
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(77,159,255,0.3);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    padding: 6px 14px;
    background: var(--surface2);
    border-radius: 50px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: all 0.3s;
  }

  .status-dot.connected { 
    background: var(--accent2); 
    box-shadow: 0 0 12px var(--accent2);
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    min-height: calc(100vh - 70px);
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: border-color 0.3s;
  }

  .card:hover { border-color: rgba(77,159,255,0.3); }

  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title::before {
    content: '';
    width: 4px;
    height: 14px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 2px;
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.9px;
    color: var(--text2);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  input[type="text"], input[type="password"], select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.2s;
    appearance: none;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(77,159,255,0.1);
  }

  .field { margin-bottom: 16px; }

  .field-hint {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    margin-top: 6px;
    line-height: 1.5;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--surface3);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid var(--border);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    height: 16px;
    width: 16px;
    left: 2px;
    top: 2px;
    background: var(--text3);
    border-radius: 50%;
    transition: 0.3s;
  }

  .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

  .tokens-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tokens-val {
    font-family: var(--mono);
    font-size: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  input[type="range"] {
    -webkit-appearance: none;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 5px;
    padding: 0;
    cursor: pointer;
    width: 100%;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(77,159,255,0.3);
  }

  .quick-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quick-btn {
    text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
    line-height: 1.5;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(77,159,255,0.08);
    transform: translateX(4px);
  }

  .quick-btn .qb-tag {
    display: inline-block;
    background: rgba(77,159,255,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 9px;
    margin-bottom: 5px;
    font-weight: 700;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 5px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    line-height: 1.5;
  }

  .history-item:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: rgba(0,229,204,0.05);
  }

  .history-item .h-num { color: var(--text3); flex-shrink: 0; font-weight: 700; }
  .history-item .h-text { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .history-empty { font-family: var(--mono); font-size: 10px; color: var(--text3); text-align: center; padding: 24px 0; }

  .main-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .query-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .query-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .mode-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 50px;
    letter-spacing: 0.6px;
    border: 1px solid;
  }

  .mode-badge.rapido { background: rgba(255,107,53,0.1); color: var(--accent3); border-color: rgba(255,107,53,0.25); }
  .mode-badge.completo { background: rgba(0,229,204,0.1); color: var(--accent2); border-color: rgba(0,229,204,0.25); }

  textarea#query {
    min-height: 140px;
    resize: vertical;
    line-height: 1.8;
    font-size: 13px;
    background: var(--surface2);
  }

  .query-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 14px;
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 6px 20px rgba(77,159,255,0.3);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(77,159,255,0.4);
  }

  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: rgba(0,229,204,0.05);
  }

  .btn-danger-ghost {
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(255,69,96,0.2);
  }

  .btn-danger-ghost:hover { background: rgba(255,69,96,0.08); }

  .btn-small { padding: 7px 12px; font-size: 10px; gap: 5px; }

  .loading-bar {
    display: none;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 14px;
    overflow: hidden;
  }

  .loading-bar.active { display: block; }

  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    animation: loadingSlide 1.4s ease-in-out infinite;
  }

  @keyframes loadingSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  .loading-msg {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    margin-top: 10px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  .loading-msg.active { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }

  .response-card.visible { 
    display: block; 
    animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .response-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .resp-tag {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 50px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border: 1px solid;
  }

  .resp-tag.ai { background: rgba(77,159,255,0.1); color: var(--accent); border-color: rgba(77,159,255,0.25); }
  .resp-tag.tokens { background: rgba(0,229,204,0.1); color: var(--accent2); border-color: rgba(0,229,204,0.25); }

  .response-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .markdown-body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
  }

  .markdown-body h1, .markdown-body h2, .markdown-body h3 {
    font-family: var(--sans);
    font-weight: 700;
    margin: 1.8em 0 0.8em;
    line-height: 1.3;
  }

  .markdown-body h1 { 
    font-size: 1.7em; 
    color: var(--text); 
    border-bottom: 2px solid var(--border); 
    padding-bottom: 12px;
  }

  .markdown-body h2 { 
    font-size: 1.35em; 
    color: var(--accent);
  }

  .markdown-body h3 { 
    font-size: 1.1em; 
    color: var(--accent2);
  }

  .markdown-body p { margin-bottom: 1.2em; }
  .markdown-body strong { color: var(--text); font-weight: 700; }
  .markdown-body code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface3);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 5px;
    color: var(--accent2);
  }

  .markdown-body pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    overflow-x: auto;
    margin: 1.2em 0;
  }

  .markdown-body pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 12px;
  }

  .markdown-body ul, .markdown-body ol {
    margin: 1em 0 1em 1.8em;
  }

  .markdown-body li { margin-bottom: 0.5em; }

  .markdown-body blockquote {
    border-left: 4px solid var(--accent);
    margin: 1.2em 0;
    padding: 12px 18px;
    background: rgba(77,159,255,0.05);
    border-radius: 0 14px 14px 0;
    color: var(--text2);
  }

  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.2em 0;
    font-family: var(--mono);
    font-size: 12px;
  }

  .markdown-body th {
    background: var(--surface3);
    color: var(--accent);
    padding: 12px 16px;
    text-align: left;
    font-weight: 700;
    border-bottom: 2px solid var(--border);
  }

  .markdown-body td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }

  .markdown-body tr:hover td { background: rgba(255,255,255,0.02); }

  .svg-container {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin: 1.2em 0;
    overflow: auto;
  }

  .svg-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 12px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .svg-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .svg-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 7px 13px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .svg-btn:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: rgba(0,229,204,0.05);
  }

  .svg-wrapper {
    overflow-x: auto;
  }

  .svg-wrapper svg {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .error-box {
    display: none;
    background: rgba(255,69,96,0.08);
    border: 1px solid rgba(255,69,96,0.25);
    border-radius: 14px;
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .error-box.visible { display: block; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface2);
    border: 1px solid var(--accent2);
    border-radius: 14px;
    padding: 13px 22px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 9999;
    transform: translateY(90px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 18px 0;
  }

  .spinner-inline {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2.5px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 1024px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
    .main-area { order: 1; }
  }

  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 8px 0; gap: 12px; }
    .mode-toggle-wrapper { order: 3; width: 100%; justify-content: center; }
    .logo-text { font-size: 16px; }
    .app { padding: 16px 12px; gap: 16px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Auto<span>Técnico</span> PRO</div>
    </div>

    <div class="mode-toggle-wrapper">
      <span class="mode-label">MODO:</span>
      <button class="mode-btn active" id="btnRapido" onclick="AppState.setMode('rapido')">⚡ Rápido</button>
      <button class="mode-btn" id="btnCompleto" onclick="AppState.setMode('completo')">📐 Completo</button>
    </div>

    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Sin conectar</span>
    </div>
  </div>
</header>

<div class="app">

  // ─────────────────────────────────────────────────────────────────────────────
  // INIT - Inicialización segura
  // ─────────────────────────────────────────────────────────────────────────────
  
  init: function() {
    try {
      console.log('[INIT] Iniciando AppState...');
      
      // Restaurar API Key
      const savedKey = sessionStorage.getItem('apiKey');
      if (savedKey) {
        document.getElementById('apiKey').value = savedKey;
        this.updateStatus(true);
      }

      // Restaurar proxy
      if (localStorage.getItem('useProxy') === 'true') {
        document.getElementById('proxyToggle').checked = true;
        document.getElementById('proxyUrlField').style.display = 'block';
      }

      const savedProxyUrl = localStorage.getItem('proxyUrl');
      if (savedProxyUrl) {
        document.getElementById('proxyUrl').value = savedProxyUrl;
      }

      // Restaurar modelo y tokens
      const savedModel = localStorage.getItem('model');
      if (savedModel) {
        document.getElementById('modelSelect').value = savedModel;
      }

      const savedTokens = localStorage.getItem('tokens');
      if (savedTokens) {
        document.getElementById('tokensRange').value = savedTokens;
        document.getElementById('tokensVal').textContent = savedTokens;
      }

      // Event listeners
      document.getElementById('apiKey').addEventListener('input', (e) => {
        sessionStorage.setItem('apiKey', e.target.value);
        this.updateStatus(e.target.value.length > 10);
      });

      document.getElementById('modelSelect').addEventListener('change', (e) => {
        localStorage.setItem('model', e.target.value);
      });

      document.getElementById('tokensRange').addEventListener('input', (e) => {
        document.getElementById('tokensVal').textContent = e.target.value;
        localStorage.setItem('tokens', e.target.value);
      });

      // Keyboard shortcut Ctrl+Enter
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          this.sendQuery();
        }
      });

      this.renderQuickBtns();
      this.renderHistory();

      console.log('[INIT] ✓ Inicialización completada');

    } catch (err) {
      console.error('[INIT] ✗ Error:', err);
      this.showError('Error inicializando: ' + (err.message || err));
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // MODE & PROXY
  // ─────────────────────────────────────────────────────────────────────────────

  setMode: function(mode) {
    try {
      this.currentMode = mode;
      document.getElementById('btnRapido').classList.toggle('active', mode === 'rapido');
      document.getElementById('btnCompleto').classList.toggle('active', mode === 'completo');

      const badge = document.getElementById('modeBadge');
      if (mode === 'rapido') {
        badge.textContent = '⚡ Diagnóstico Rápido';
        badge.className = 'mode-badge rapido';
      } else {
        badge.textContent = '📐 Didáctico Completo';
        badge.className = 'mode-badge completo';
      }
    } catch (err) {
      console.error('[setMode] Error:', err);
    }
  },

  toggleProxy: function() {
    try {
      const checked = document.getElementById('proxyToggle').checked;
      document.getElementById('proxyUrlField').style.display = checked ? 'block' : 'none';
      localStorage.setItem('useProxy', checked ? 'true' : 'false');
      if (checked) {
        localStorage.setItem('proxyUrl', document.getElementById('proxyUrl').value);
      }
    } catch (err) {
      console.error('[toggleProxy] Error:', err);
    }
  },

  updateStatus: function(ok) {
    try {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (ok) {
        dot.classList.add('connected');
        txt.textContent = 'API Key configurada';
      } else {
        dot.classList.remove('connected');
        txt.textContent = 'Sin conectar';
      }
    } catch (err) {
      console.error('[updateStatus] Error:', err);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // TEST CONNECTION
  // ─────────────────────────────────────────────────────────────────────────────

  testConnection: async function() {
    try {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        this.showError('Introduce una API Key primero.');
        return;
      }

      const testBtn = document.getElementById('testConnBtn');
      const originalText = testBtn.textContent;
      testBtn.disabled = true;
      testBtn.textContent = '🔄 Probando...';

      const useProxy = document.getElementById('proxyToggle').checked;
      const proxyUrl = document.getElementById('proxyUrl').value.trim();
      const apiUrl = 'https://api.anthropic.com/v1/messages';
      const targetUrl = useProxy ? (proxyUrl + encodeURIComponent(apiUrl)) : apiUrl;

      const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          ...(useProxy ? {} : { 'anthropic-dangerous-direct-browser-access': 'true' })
        },
        body: JSON.stringify({
          model: 'claude-3-5-haiku-20241022',
          max_tokens: 50,
          messages: [{ role: 'user', content: 'OK' }]
        })
      });

      const data = await response.json();

      if (response.ok) {
        this.showToast('✓ Conexión exitosa a Anthropic');
        this.updateStatus(true);
      } else {
        const errMsg = data?.error?.message || response.statusText;
        this.showError(`Error API: ${errMsg}`);
        this.updateStatus(false);
      }

      testBtn.disabled = false;
      testBtn.textContent = originalText;

    } catch (err) {
      console.error('[testConnection] Error:', err);
      const testBtn = document.getElementById('testConnBtn');
      testBtn.disabled = false;
      testBtn.textContent = '🔌 Probar conexión';
      this.showError(`Error conexión: ${err.message}\n¿Necesitas proxy CORS?`);
      this.updateStatus(false);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // QUICK BUTTONS & HISTORY
  // ─────────────────────────────────────────────────────────────────────────────

  renderQuickBtns: function() {
    try {
      const grid = document.getElementById('quickGrid');
      if (!grid) return;

      grid.innerHTML = this.quickPrompts.map((p, i) => `
        <button class="quick-btn" onclick="AppState.fillQuery(${i})">
          <div class="qb-tag">${this.escapeHtml(p.tag)}</div>
          <div>${this.escapeHtml(p.text.slice(0, 60))}...</div>
        </button>
      `).join('');
    } catch (err) {
      console.error('[renderQuickBtns] Error:', err);
    }

  fillQuery: function(idx) {
    try {
      if (this.quickPrompts[idx]) {
        document.getElementById('query').value = this.quickPrompts[idx].text;
        document.getElementById('query').focus();
      }

  getHistory: function() {
    try {
      return JSON.parse(localStorage.getItem('queryHistory') || '[]');
    } catch {
      return [];
    }
  },

  saveToHistory: function(query, response) {
    try {
      let history = this.getHistory();
      history.unshift({ query, response, ts: Date.now() });
      history = history.slice(0, 5);
      localStorage.setItem('queryHistory', JSON.stringify(history));
      this.renderHistory();
    } catch (err) {
      console.error('[saveToHistory] Error:', err);
    }

  renderHistory: function() {
    try {
      const list = document.getElementById('historyList');
      if (!list) return;

      const history = this.getHistory();
      if (!history.length) {
        list.innerHTML = '<div class="history-empty">Sin consultas recientes.</div>';
        return;
      }

      list.innerHTML = history.map((h, i) => `
        <div class="history-item" onclick="AppState.loadHistory(${i})">

          <span class="h-text">${this.escapeHtml(h.query)}</span>

      console.error('[renderHistory] Error:', err);

  loadHistory: function(i) {
    try {
      const history = this.getHistory();
      if (!history[i]) return;

      document.getElementById('query').value = history[i].query;
      this.lastRawResponse = history[i].response;
      this.renderResponse(history[i].response, 0, '(historial)');
    } catch (err) {
      console.error('[loadHistory] Error:', err);
      this.showError('Error cargando historial: ' + err.message);
    }

  clearHistory: function() {
    try {
      localStorage.removeItem('queryHistory');

  // ─────────────────────────────────────────────────────────────────────────────
  // MAIN QUERY (SEND TO API)
  // ─────────────────────────────────────────────────────────────────────────────

  sendQuery: async function() {
    try {
      const apiKey = document.getElementById('apiKey').value.trim();
      const query = document.getElementById('query').value.trim();
      const model = document.getElementById('modelSelect').value;
      const maxTokens = parseInt(document.getElementById('tokensRange').value) || 4000;
      const useProxy = document.getElementById('proxyToggle').checked;
      const proxyUrl = document.getElementById('proxyUrl').value.trim();

      if (!apiKey) {
        this.showError('⚠️ Introduce tu API Key primero.');
        return;
      }
      if (!query) {
        this.showError('⚠️ Escribe una consulta.');
        return;
      }

      console.log('[sendQuery] Enviando consulta:', { mode: this.currentMode, model, tokens: maxTokens });

      this.hideError();
      this.setLoading(true);
      document.getElementById('responseCard').classList.remove('visible');

      const systemPrompt = this.systemPrompts[this.currentMode] || this.systemPrompts.rapido;
      const apiUrl = 'https://api.anthropic.com/v1/messages';
      const targetUrl = useProxy ? (proxyUrl + encodeURIComponent(apiUrl)) : apiUrl;

      const body = {
        model,
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: query }]
      };

      const response = await fetch(targetUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          ...(useProxy ? {} : { 'anthropic-dangerous-direct-browser-access': 'true' })
        },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) {
        const msg = data?.error?.message || `HTTP ${response.status}`;
        throw new Error(msg);
      }

      this.updateStatus(true);

      const text = data.content?.map(b => b?.text || '').join('') || '';
      const tokensUsed = data.usage?.output_tokens || 0;
      this.lastRawResponse = text;

      console.log('[sendQuery] ✓ Respuesta recibida, tokens:', tokensUsed);

      this.saveToHistory(query, text);
      this.renderResponse(text, tokensUsed, this.currentMode);

    } catch (err) {
      console.error('[sendQuery] Error:', err);
      let msg = err.message || 'Error desconocido';
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
        msg = `Error de red / CORS.\nActiva el proxy CORS o usa servidor local.\n\nDetalle: ${msg}`;
      } else if (msg.includes('invalid') || msg.includes('authentication')) {
        msg = `API Key inválida.\nVerifica en console.anthropic.com\n\nDetalle: ${msg}`;
      }
      this.showError('❌ ' + msg);
      this.updateStatus(false);
    } finally {
      this.setLoading(false);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // CRITICAL: EXTRACT SVG BEFORE MARKED.PARSE() - ESTO EVITA EL CONGELAMIENTO
  // ─────────────────────────────────────────────────────────────────────────────

  /**
   * Extrae TODOS los bloques SVG del texto ANTES de procesarlos con marked.
   * Esto es CRÍTICO para evitar "Unexpected identifier 'svg'" y congelamiento.
   * 
   * Algoritmo:
   * 1. Buscar todos los bloques ```svg ... ``` y ```html <svg... ```
   * 2. Guardarlos en array (this.svgStorage)
   * 3. Reemplazarlos con placeholders [[SVG_0]], [[SVG_1]], etc.
   * 4. Hacer marked.parse del RESTO del texto (sin SVG)
   * 5. Reemplazar los placeholders con SVG reales envueltos en HTML
   */
  extractAndReplaceSvgs: function(text) {
    try {
      if (!text || typeof text !== 'string') return text;

      this.svgStorage = []; // Resetear almacenamiento
      let result = text;

      // Regex 1: ```svg ... ```
      result = result.replace(/```svg\n([\s\S]*?)\n```/g, (match, svgCode) => {
        const idx = this.svgStorage.length;
        this.svgStorage.push(svgCode.trim());
        return `\n[[SVG_${idx}]]\n`;
      });

      // Regex 2: ```html <svg...``` (HTML blocks con SVG)
      result = result.replace(/```html\n([\s\S]*?)\n```/g, (match, htmlCode) => {
        if (htmlCode.includes('<svg')) {
          const idx = this.svgStorage.length;
          this.svgStorage.push(htmlCode.trim());
          return `\n[[SVG_${idx}]]\n`;
        }
        return match; // No es SVG, dejar como está
      });

      console.log(`[extractAndReplaceSvgs] Extraídos ${this.svgStorage.length} SVGs`);
      return result;

    } catch (err) {
      console.error('[extractAndReplaceSvgs] Error:', err);
      return text;
    }
  },

  /**
   * Reinserta los SVGs después de que marked ha procesado el resto del markdown.
   * Cada SVG se envuelve con controles de descarga y zoom.
   */
  reinsertSvgs: function(html) {
    try {
      let result = html;

      // Reemplazar cada placeholder con su SVG real
      for (let i = 0; i < this.svgStorage.length; i++) {
        const placeholder = `[[SVG_${i}]]`;
        const svgCode = this.svgStorage[i];
        
        const wrapped = `
<div class="svg-container">
  <div class="svg-label">📊 Diagrama SVG #${i + 1}</div>
  <div class="svg-controls" data-svg-index="${i}">
    <button class="svg-btn" onclick="AppState.downloadSVG(${i})">💾 Descargar</button>
    <button class="svg-btn" onclick="AppState.zoomSVG(${i}, 1.3)">🔍 +Zoom</button>
    <button class="svg-btn" onclick="AppState.zoomSVG(${i}, 0.75)">🔍 -Zoom</button>
  </div>
  <div class="svg-wrapper" data-svg-index="${i}">
    ${svgCode}
  </div>
</div>
`;
        
        // Reemplazar el placeholder (escapado para que marked lo haya procesado)
        result = result.replace(placeholder, wrapped);
      }

      return result;

    } catch (err) {
      console.error('[reinsertSvgs] Error:', err);
      return html;
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER RESPONSE - Processamiento seguro de Markdown + SVG
  // ─────────────────────────────────────────────────────────────────────────────

  renderResponse: function(text, tokens, mode) {
    try {
      const card = document.getElementById('responseCard');
      const body = document.getElementById('responseBody');

      if (!card || !body) return;

      console.log('[renderResponse] Iniciando renderizado...');

      // PASO 1: Extraer SVGs ANTES de marked.parse()
      const textWithPlaceholders = this.extractAndReplaceSvgs(text);

      // PASO 2: Procesar markdown del resto del texto
      let htmlMarkdown = '';
      try {
        htmlMarkdown = marked.parse(textWithPlaceholders) || '';
      } catch (err) {
        console.error('[renderResponse] Error en marked.parse:', err);
        htmlMarkdown = `<pre>Error procesando markdown: ${this.escapeHtml(err.message)}</pre>`;
      }

      // PASO 3: Reinsertار los SVGs con sus controles
      const finalHtml = this.reinsertSvgs(htmlMarkdown);

      // PASO 4: Inyectar HTML
      body.innerHTML = finalHtml;

      // PASO 5: Actualizar metadata
      if (tokens > 0) {
        document.getElementById('tokenCount').textContent = `${tokens.toLocaleString()} tokens`;
      }

      const modeTag = document.getElementById('modeUsedTag');
      if (mode === 'completo') {
        modeTag.textContent = '📐 Modo Completo';
        modeTag.style.cssText = 'background:rgba(0,229,204,0.1);color:var(--accent2);border-color:rgba(0,229,204,0.25)';
      } else if (mode === 'rapido') {
        modeTag.textContent = '⚡ Modo Rápido';
        modeTag.style.cssText = 'background:rgba(255,107,53,0.1);color:var(--accent3);border-color:rgba(255,107,53,0.25)';
      } else {
        modeTag.textContent = mode;
      }

      card.classList.add('visible');
      console.log('[renderResponse] ✓ Renderizado completado');

      // Scroll suave
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);

    } catch (err) {
      console.error('[renderResponse] Error crítico:', err);
      this.showError(`Error renderizando respuesta: ${err.message}\n\nStack: ${err.stack}`);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // SVG CONTROLS
  // ─────────────────────────────────────────────────────────────────────────────

  downloadSVG: function(idx) {
    try {
      if (!this.svgStorage[idx]) {
        this.showError(`SVG #${idx} no encontrado`);
        return;
      }

      const svgCode = this.svgStorage[idx];
      const blob = new Blob([svgCode], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `diagrama-${idx}-${Date.now()}.svg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      this.showToast('✓ SVG descargado');
    } catch (err) {
      console.error('[downloadSVG] Error:', err);
      this.showError('Error descargando SVG: ' + err.message);
    }
  },

  zoomSVG: function(idx, factor) {
    try {
      const svg = document.querySelector(`[data-svg-index="${idx}"] svg`);
      if (!svg) {
        console.warn(`SVG #${idx} no renderizado aún`);
        return;
      }

      const currentScale = parseFloat(svg.dataset.scale || 1);
      const newScale = Math.max(0.5, Math.min(3, currentScale * factor));
      svg.dataset.scale = newScale;
      svg.style.transform = `scale(${newScale})`;
      svg.style.transformOrigin = 'top center';
      svg.style.display = 'block';
      svg.style.margin = '0 auto';

      console.log(`[zoomSVG] SVG #${idx} zoom a ${(newScale * 100).toFixed(0)}%`);
    } catch (err) {
      console.error('[zoomSVG] Error:', err);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // COPY & PDF EXPORT
  // ─────────────────────────────────────────────────────────────────────────────

  copyResponse: function() {
    try {
      if (!this.lastRawResponse) {
        this.showError('No hay respuesta para copiar');
        return;
      }

      navigator.clipboard.writeText(this.lastRawResponse).then(() => {
        this.showToast('✓ Respuesta copiada');
      }).catch(err => {
        console.error('[copyResponse] Error:', err);
        this.showError('Error copiando respuesta');
      });
    } catch (err) {
      console.error('[copyResponse] Error:', err);
    }
  },

  exportPDF: async function() {
    try {
      if (!this.lastRawResponse) {
        this.showError('No hay respuesta para exportar');
        return;
      }

      this.showToast('Generando PDF...');
      const { jsPDF } = window.jspdf;
      const el = document.getElementById('responseBody');

      if (!el) {
        this.showError('Elemento de respuesta no encontrado');
        return;
      }

      const canvas = await html2canvas(el, {
        backgroundColor: '#0a0d12',
        scale: 1.5,
        useCORS: true,
        allowTaint: true
      });

      const imgData = canvas.toDataURL('image/png');
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgW = pageW - 20;
      const imgH = (canvas.height * imgW) / canvas.width;

      let y = 10;
      pdf.setFillColor(10, 13, 18);
      pdf.rect(0, 0, pageW, pageH, 'F');

      pdf.setTextColor(77, 159, 255);
      pdf.setFont('courier', 'bold');
      pdf.setFontSize(14);
      pdf.text('AutoTécnico Pro — Diagnóstico SVG', 10, y);
      pdf.setFontSize(9);
      pdf.setTextColor(145, 153, 183);
      pdf.text(`${new Date().toLocaleString('es-ES')}`, 10, y + 6);
      y += 14;

      let remainH = imgH;
      while (remainH > 0) {
        const srcY = (imgH - remainH) / imgH * canvas.height;
        const sliceH = Math.min(remainH, pageH - y - 10);
        const sliceCanvasH = (sliceH / imgH) * canvas.height;

        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = sliceCanvasH;
        const ctx = sliceCanvas.getContext('2d');
        ctx.drawImage(canvas, 0, srcY, canvas.width, sliceCanvasH, 0, 0, canvas.width, sliceCanvasH);

        pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', 10, y, imgW, sliceH);

        remainH -= sliceH;
        if (remainH > 0) {
          pdf.addPage();
          pdf.setFillColor(10, 13, 18);
          pdf.rect(0, 0, pageW, pageH, 'F');
          y = 10;
        }
      }

      const query = document.getElementById('query').value.slice(0, 20).replace(/\s+/g, '_');
      pdf.save(`autotecnico_${query}_${Date.now()}.pdf`);
      this.showToast('✓ PDF exportado');

    } catch (err) {
      console.error('[exportPDF] Error:', err);
      this.showToast('❌ Error PDF: ' + err.message);
    }
  },

  // ─────────────────────────────────────────────────────────────────────────────
  // UTILS
  // ─────────────────────────────────────────────────────────────────────────────

  clearQuery: function() {
    try {
      document.getElementById('query').value = '';
      this.hideError();
    } catch (err) {
      console.error('[clearQuery] Error:', err);
    }
  },

  setLoading: function(on) {
    try {
      document.getElementById('loadingBar').classList.toggle('active', on);
      document.getElementById('loadingMsg').classList.toggle('active', on);
      const btn = document.getElementById('sendBtn');
      const icon = document.getElementById('sendIcon');
      const txt = document.getElementById('sendTxt');

      btn.disabled = on;
      if (on) {
        icon.innerHTML = '<span class="spinner-inline"></span>';
        txt.textContent = 'Procesando...';
      } else {
        icon.textContent = '▶';
        txt.textContent = 'Consultar';
      }
    } catch (err) {
      console.error('[setLoading] Error:', err);
    }
  },

  showError: function(msg) {
    try {
      const box = document.getElementById('errorBox');
      if (box) {
        box.textContent = msg || 'Error desconocido';
        box.classList.add('visible');
      }
    } catch (err) {
      console.error('[showError] Error:', err);
    }
  },

  hideError: function() {
    try {
      const box = document.getElementById('errorBox');
      if (box) box.classList.remove('visible');
    } catch (err) {
      console.error('[hideError] Error:', err);
    }
  },

  showToast: function(msg) {
    try {
      const t = document.getElementById('toast');
      if (t) {
        t.textContent = msg || 'Ok';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }
    } catch (err) {
      console.error('[showToast] Error:', err);
    }
  },

  escapeHtml: function(str) {
    try {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    } catch {
      return '';
    }
  }
};

// ═════════════════════════════════════════════════════════════════════════════════
// BLOQUE 2: INIT - Ejecuta cuando DOM está listo
// ═════════════════════════════════════════════════════════════════════════════════

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    console.log('[APP] DOM cargado, inicializando...');
    AppState.init();
  });
} else {
  console.log('[APP] DOM ya cargado, inicializando...');
  AppState.init();
}
</script>
